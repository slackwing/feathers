<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WriteSys - Book Annotation System</title>

  <!-- Book-style CSS -->
  <link rel="stylesheet" href="/css/book.css?v=39">

  <!-- Paged.js for book pagination - loaded but not auto-run -->
  <script>
    // Prevent Paged.js from auto-running on page load
    window.PagedConfig = {
      auto: false
    };
  </script>
  <script src="https://unpkg.com/pagedjs/dist/paged.polyfill.js"></script>
</head>
<body>
  <!-- Info bar (not paginated) -->
  <div id="controls" class="pagedjs_ignore">
    <div class="control-group">
      <label>Migration:</label>
      <span id="migration-info">Loading...</span>
      <label>Repo:</label>
      <input type="text" id="repo-path" value="manuscripts/test-repo" />
      <label>File:</label>
      <input type="text" id="file-path" value="the-wildfire.manuscript" />
    </div>
    <div class="control-group">
      <span id="status">Ready</span>
      <span id="sentence-count"></span>
    </div>
  </div>

  <!-- Annotation margin container (floating in right grey margin) -->
  <div id="annotation-margin" class="pagedjs_ignore">
    <div class="annotation-margin-inner">
      <!-- Color palette for highlights -->
      <div id="color-palette" class="color-palette">
        <div class="color-circle" data-color="yellow" style="background-color: #FFF3A3;" title="Yellow"></div>
        <div class="color-circle" data-color="green" style="background-color: #C3FDB8;" title="Green"></div>
        <div class="color-circle" data-color="blue" style="background-color: #AEDFF7;" title="Blue"></div>
        <div class="color-circle" data-color="purple" style="background-color: #E0BBE4;" title="Purple"></div>
        <div class="color-circle" data-color="red" style="background-color: #FFCCCB;" title="Red"></div>
        <div class="color-circle" data-color="orange" style="background-color: #FFD8A8;" title="Orange"></div>
      </div>

      <!-- Note textbox -->
      <div id="note-container">
        <textarea id="note-input" placeholder="Optional note..." rows="3"></textarea>
      </div>

      <!-- Tags section -->
      <div id="tags-container">
        <div id="tags-list">
          <!-- Tag chips will appear here -->
        </div>
      </div>

      <!-- Annotation list -->
      <div id="margin-annotations">
        <!-- Annotations will appear here -->
      </div>
    </div>
  </div>

  <!-- Container for entire app -->
  <div id="app-container">
    <!-- Manuscript content (will be paginated by Paged.js) -->
    <div id="manuscript-content">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <!-- External libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/smartquotes/2.3.2/smartquotes.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Paged.js configuration (must load after Paged.js, before renderer) -->
  <script src="/js/pagedjs-config.js"></script>

  <!-- Segmenter (must load before renderer) -->
  <script src="/js/segmenter.js"></script>

  <!-- Application scripts -->
  <script src="/js/renderer.js?v=62"></script>
  <script src="/js/annotations.js?v=31"></script>
</body>
</html>
