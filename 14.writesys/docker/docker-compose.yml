version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: writesys-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - writesys-network

  liquibase:
    build:
      context: .
      dockerfile: Dockerfile.liquibase
    container_name: writesys-liquibase
    profiles:
      - migrate
    environment:
      LIQUIBASE_COMMAND_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      LIQUIBASE_COMMAND_USERNAME: ${POSTGRES_USER}
      LIQUIBASE_COMMAND_PASSWORD: ${POSTGRES_PASSWORD}
      LIQUIBASE_COMMAND_CHANGELOG_FILE: ${LIQUIBASE_CHANGELOG_FILE}
    volumes:
      - ./liquibase:/liquibase/changelog
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - writesys-network

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: writesys-api
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      API_PORT: ${API_PORT}
      API_HOST: ${API_HOST}
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ../web:/app/web
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - writesys-network

volumes:
  postgres-data:

networks:
  writesys-network:
    driver: bridge
